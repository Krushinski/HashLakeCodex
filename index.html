<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Hashlake, a browser-based Bitcoin lake artwork built with Three.js."
    />
    <title>Hashlake / Bitcoin Lake</title>
  </head>
  <body>
    <div id="app" aria-label="Hashlake interactive scene"></div>
    <div id="fallback" class="fallback-scene" role="status" aria-live="polite">
      <div class="fallback-scene__field">
        <div class="fallback-scene__scanline"></div>
        <div class="fallback-scene__horizon"></div>
        <div class="fallback-scene__signal"></div>
        <div class="fallback-scene__waveform">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <div class="fallback-scene__message">
        <strong>Listening to the chain</strong>
        <em>Hashlake</em>
        <span id="fallback-detail">Reading the mempool and warming the lake...</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
